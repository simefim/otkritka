<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: linear-gradient(135deg, #ffe5ec, #ffc2d1);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 20px;
        }

        .card-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(228, 130, 154, 0.3);
            text-align: center;
            max-width: 400px;
            width: 100%;
            border: 2px solid #fff;
            position: relative;
            z-index: 10;
            transition: transform 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .card-container::-webkit-scrollbar {
            width: 6px;
        }
        .card-container::-webkit-scrollbar-thumb {
            background-color: rgba(255, 71, 126, 0.3);
            border-radius: 3px;
        }

        .card-container:hover {
            transform: translateY(-5px);
        }

        .photo-frame {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 5px solid #fff;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .photo-frame img {
            width: 100%;
            height: auto;
            display: block;
        }

        .gift-emoji {
            font-size: 50px;
            margin-bottom: 10px;
            display: inline-block;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            color: #ff477e;
            font-size: 24px;
            margin-bottom: 15px;
        }

        p {
            color: #6c757d;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .btn {
            background: linear-gradient(45deg, #ff758f, #ff477e);
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255, 71, 126, 0.4);
            transition: all 0.3s ease;
            margin-bottom: 10px;
        }

        .btn:hover {
            background: linear-gradient(45deg, #ff477e, #ff758f);
            box-shadow: 0 7px 20px rgba(255, 71, 126, 0.6);
            transform: scale(1.05);
        }

        .secret-message {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: all 0.5s ease-in-out;
            font-size: 17px;
            color: #ff1a53;
            font-weight: 600;
            line-height: 1.4;
        }

        .secret-message.show {
            max-height: 300px;
            opacity: 1;
            margin-top: 15px;
            padding: 15px 10px;
            border-top: 1px dashed #ffb3c6;
        }

        .heart {
            position: absolute;
            font-size: 20px;
            color: #ff758f;
            opacity: 0;
            pointer-events: none;
            animation: floatUp 4s linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            10% { opacity: 0.8; }
            90% { opacity: 0.8; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="gift-emoji">💘</div>
        <h1>Для маей амины</h1>

        <div class="photo-frame">
            <img src="IMG_9499.heic">
        </div>

        <p>Пусть каждый день приносит поводы для улыбок, а на душе всё было хорошо. Ты моя подрунька!&#41;</p>
        
        <button class="btn" onclick="showMessage()">Тыкни сюды</button>
        
        <div class="secret-message" id="secretMessage">
            Аминка<br><br>
            Оставайся всегда такой же какая ты есть, чмок&#41;
        </div>
    </div>

    <script>
        function showMessage() {
            const message = document.getElementById('secretMessage');
            message.classList.toggle('show');
            
            if(message.classList.contains('show')) {
                setTimeout(() => {
                    document.querySelector('.card-container').scrollTo({
                        top: document.querySelector('.card-container').scrollHeight,
                        behavior: 'smooth'
                    });
                }, 300);

                for (let i = 0; i < 15; i++) {
                    setTimeout(createHeart, i * 100);
                }
            }
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            const heartTypes = ['❤️', '💖', '💝', '✨', '🌸'];
            heart.innerText = heartTypes[Math.floor(Math.random() * heartTypes.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 2 + 3 + 's';
            document.body.appendChild(heart);
            setTimeout(() => { heart.remove(); }, 5000);
        }

        setInterval(createHeart, 800);
    </script>
</body>
</html>
